# AI Agent Platform — Nginx Reverse Proxy
# Optional: use this file if you want Nginx to serve static files and
# reverse-proxy API/WebSocket traffic to the backend.
#
# Usage:
#   docker run -v $(pwd)/deploy/nginx.conf:/etc/nginx/conf.d/default.conf nginx

server {
    listen 80;
    server_name _;

    # Static files (served by Nginx for maximum performance)
    root /var/www/html;
    index index.html;

    # Cache-busted assets (JS/CSS with hashes)
    location /assets/ {
        root /var/www/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API reverse proxy
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
    }

    # WebSocket reverse proxy
    location /ws/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }

    # Health check
    location /health {
        proxy_pass http://app:8000;
        access_log off;
    }

    # SPA fallback — all other paths return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
