# RBAC Configuration — Role-Based Access Control for tool and skill permissions
# This file is the single source of truth for role-to-tool mappings.
# mcp_tools: "server:tool" format, supports "server:*" wildcard for all tools from a server.

rbac:
  roles:
    admin:
      tools: [file_read, file_write, command_exec, python_exec, web_search, query_database, send_notification, memory_manage]
      mcp_tools: ["*"]
      skill_access: all
      approval_level: L3

    manager:
      tools: [file_read, file_write, web_search, query_database, send_notification, memory_manage]
      mcp_tools: ["filesystem:read", "database:query"]
      skill_access: enterprise
      approval_level: L3

    operator:
      tools: [file_read, web_search, query_database, send_notification, memory_manage]
      mcp_tools: []
      skill_access: production
      approval_level: L3

    viewer:
      tools: [file_read, web_search, query_database, memory_manage]
      mcp_tools: []
      skill_access: report
      approval_level: L2
